<!-- ================================================
     EXPERT CHAT SYSTEM INTEGRATION GUIDE
     How to add the red notification badge and chat system
     ================================================ -->

<!-- STEP 1: Add CSS (in <head> section) -->
<link rel="stylesheet" href="chat-enhanced-styles.css">

<!-- STEP 2: Add notification badge to chat icon (in navigation) -->
<div class="nav-icon" id="chatIcon" onclick="openChatModal()" style="position: relative;">
    <i class="fas fa-comments"></i>
    <span class="nav-label">Messages</span>
    
    <!-- RED NOTIFICATION BADGE (Your Idea!) -->
    <span id="chatNotificationBadge">0</span>
</div>

<!-- STEP 3: Chat Modal Structure -->
<div id="chatModal" class="modal" style="display: none;">
    <div class="modal-content chat-modal-content">
        <div class="modal-header">
            <h2><i class="fas fa-comments"></i> Chat System</h2>
            <button class="close-btn" onclick="closeChatModal()">&times;</button>
        </div>

        <!-- EXPERT VIEW: Two Tabs (Requests & Chats) -->
        <div id="chatListView" style="display: flex; flex-direction: column;">
            
            <!-- Tab Navigation -->
            <div class="chat-tabs">
                <button id="requestsTab" class="chat-tab active" onclick="switchToRequestsTab()">
                    <i class="fas fa-inbox"></i> Requests
                    <span class="tab-count" id="requestsCount"></span>
                </button>
                <button id="chatsTab" class="chat-tab" onclick="switchToChatTab()">
                    <i class="fas fa-comments"></i> Active Chats
                    <span class="tab-count" id="chatsCount"></span>
                </button>
            </div>

            <!-- Pending Requests Container -->
            <div id="pendingRequestsContainer">
                <!-- JavaScript will populate this -->
                <div style="text-align: center; padding: 40px; color: #888;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 32px;"></i>
                    <p>Loading requests...</p>
                </div>
            </div>

            <!-- Active Chats Container -->
            <div id="activeChatsContainer" style="display: none;">
                <!-- JavaScript will populate this -->
                <div style="text-align: center; padding: 40px; color: #888;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 32px;"></i>
                    <p>Loading chats...</p>
                </div>
            </div>
        </div>

        <!-- Chat Messages View (When a chat is opened) -->
        <div id="chatMessagesView" style="display: none;">
            <!-- Chat Header -->
            <div class="chat-conversation-header">
                <button class="chat-back-btn" onclick="backToChatList()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <img id="chatUserAvatar" src="" alt="User">
                <span id="chatUserName">User</span>
            </div>

            <!-- Messages Area -->
            <div id="chatMessages">
                <!-- Messages will be populated here -->
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <input 
                    type="text" 
                    id="chatInput" 
                    placeholder="Type a message..." 
                    onkeypress="handleChatEnter(event)"
                >
                <button class="chat-send-btn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i> Send
                </button>
            </div>
        </div>
    </div>
</div>

<!-- STEP 4: Add JavaScript (before </body>) -->
<script src="chat-functionality-enhanced.js"></script>

<!-- STEP 5: Chat Modal Control Functions -->
<script>
function openChatModal() {
    document.getElementById('chatModal').style.display = 'flex';
    
    // Refresh data when opening
    if (typeof loadPendingRequests === 'function') {
        loadPendingRequests();
    }
    if (typeof loadActiveConnections === 'function') {
        loadActiveConnections();
    }
    if (typeof updateNotificationBadge === 'function') {
        updateNotificationBadge();
    }
}

function closeChatModal() {
    document.getElementById('chatModal').style.display = 'none';
    
    // Close any open chat view
    if (typeof backToChatList === 'function') {
        backToChatList();
    }
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('chatModal');
    if (event.target === modal) {
        closeChatModal();
    }
}
</script>

<!-- ================================================
     USAGE INSTRUCTIONS
     ================================================

1. FOR REGULAR USERS (sending requests):
   - Click "Message" button on expert card
   - Calls: sendConnectionRequest(expertId, expertName)
   - Request is sent to expert
   - Expert gets notification (red badge)

2. FOR EXPERTS (receiving requests):
   - Red badge appears on chat icon
   - Click chat icon to open modal
   - See two tabs: "Requests" and "Active Chats"
   
   IN REQUESTS TAB:
   - See all pending connection requests
   - Each request shows:
     * User avatar
     * User ID (or name if available)
     * Time of request
     * Request message
   - Click "Accept" → Request becomes active chat
   - Click "Reject" → Request is deleted

   IN ACTIVE CHATS TAB:
   - See all accepted connections
   - Click on any chat to open conversation
   - Send/receive encrypted messages
   - Click trash icon to delete chat

3. CHAT CONVERSATION:
   - Messages are encrypted before storing in MongoDB
   - Real-time updates (polling every 2 seconds)
   - Messages marked as read automatically
   - Back arrow returns to chat list

4. NOTIFICATION SYSTEM:
   - Red badge shows: unread messages + pending requests
   - Updates every 10 seconds automatically
   - Pulse animation draws attention
   - Badge hides when count is 0

5. DELETE FUNCTIONALITY:
   - Click trash icon on any chat
   - Confirmation dialog appears
   - If confirmed, chat and all messages deleted from MongoDB
   - Updates UI immediately

================================================ -->

<!-- ================================================
     API ENDPOINTS SUMMARY
     ================================================

POST /api/chat/request-connection
- Send connection request
- Body: { lawyerId, message }

GET /api/chat/pending-requests
- Get pending requests (experts only)
- Returns: { success, requests: [...] }

POST /api/chat/respond-request/:connectionId
- Accept/reject request
- Body: { action: 'accepted' | 'rejected' }

GET /api/chat/connections
- Get active chats
- Returns: { success, connections: [...] }

POST /api/chat/send-message
- Send encrypted message
- Body: { connectionId, message }

GET /api/chat/messages/:connectionId
- Get decrypted messages
- Returns: { success, messages: [...] }

GET /api/chat/unread-count
- Get notification badge count
- Returns: { success, unreadCount, pendingRequests, totalCount }

DELETE /api/chat/delete-connection/:connectionId
- Delete chat and all messages
- Returns: { success, deletedMessages }

POST /api/chat/mark-read/:connectionId
- Mark messages as read
- Returns: { success, markedCount }

================================================ -->
